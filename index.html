<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paris in 4 Days — Your Personal Tour Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #F7F2E8;
      --parchment:#EDE5D0;
      --gold:     #B8973C;
      --gold-lt:  #D4AF5A;
      --dark:     #2C1A0E;
      --mid:      #5C3D20;
      --muted:    #9A8066;
      --bubble-user: #2C1A0E;
      --bubble-bot:  #FFFDF7;
      --border:   #DDD0B5;
      --shadow:   0 4px 24px rgba(44,26,14,.12);
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
    }

    /* ── Decorative top band ── */
    .topband {
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-lt) 50%, var(--gold) 100%);
    }

    /* ── Header ── */
    header {
      width: 100%;
      text-align: center;
      padding: 36px 16px 24px;
      background: var(--cream);
      position: relative;
    }

    .eiffel-icon {
      display: block;
      margin: 0 auto 12px;
      width: 48px;
      opacity: .85;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--dark);
      letter-spacing: .04em;
    }

    header h1 em {
      font-style: italic;
      color: var(--gold);
    }

    header p.subtitle {
      margin-top: 6px;
      font-size: .95rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: var(--gold);
      margin: 16px auto 0;
      opacity: .6;
    }

    /* ── Chat window ── */
    .chat-wrapper {
      width: 100%;
      max-width: 720px;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }

    #chat-window {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      min-height: 420px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    /* Scrollbar */
    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot  { flex-direction: row; }
    .msg.user { flex-direction: row-reverse; }

    /* Avatar */
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: var(--parchment);
      border: 1px solid var(--border);
    }
    .msg.user .avatar {
      background: var(--dark);
      color: var(--gold-lt);
      font-size: 13px;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    /* Bubble */
    .bubble {
      max-width: 75%;
      padding: 13px 18px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: .95rem;
    }

    .msg.bot .bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--dark);
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      color: #F7F2E8;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 13px 18px;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: blink 1.2s infinite ease-in-out both;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { transform: scale(.7); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1; }
    }

    /* ── Option Chips ── */
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 4px 0 2px;
      animation: fadeUp .4s ease both;
    }

    .chip {
      padding: 9px 18px;
      border-radius: 24px;
      border: 1.5px solid var(--gold);
      background: transparent;
      color: var(--dark);
      font-family: 'Lato', sans-serif;
      font-size: .88rem;
      cursor: pointer;
      transition: background .2s, color .2s, transform .15s;
      letter-spacing: .03em;
    }
    .chip:hover {
      background: var(--gold);
      color: #fff;
      transform: translateY(-2px);
    }
    .chip:active { transform: translateY(0); }

    /* ── Text input bar ── */
    .input-bar {
      display: flex;
      margin-top: 14px;
      gap: 10px;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 8px 8px 20px;
      box-shadow: 0 2px 12px rgba(44,26,14,.08);
    }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Lato', sans-serif;
      font-size: .95rem;
      color: var(--dark);
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--gold);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s;
      flex-shrink: 0;
    }
    #send-btn:hover  { background: var(--dark); transform: scale(1.07); }
    #send-btn:active { transform: scale(.97); }

    /* ── Itinerary card ── */
    .plan-card {
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      font-size: .92rem;
      line-height: 1.7;
      color: var(--dark);
    }

    .plan-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-block {
      margin-bottom: 16px;
    }

    .day-block h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--mid);
      margin-bottom: 6px;
      border-left: 3px solid var(--gold);
      padding-left: 10px;
    }

    .day-block ul {
      list-style: none;
      padding-left: 14px;
    }

    .day-block ul li::before {
      content: '✦ ';
      color: var(--gold-lt);
      font-size: .75rem;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      text-align: center;
      padding: 12px;
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .04em;
    }

    footer span { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      #chat-window { padding: 20px 14px; }
      .bubble { font-size: .9rem; max-width: 88%; }
    }
  </style>
</head>
<body>

  <div class="topband"></div>

  <header>
    <!-- Eiffel Tower SVG icon -->
    <svg class="eiffel-icon" viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g fill="#B8973C">
        <!-- Tip -->
        <rect x="48" y="0" width="4" height="18" rx="2"/>
        <!-- Upper section -->
        <polygon points="42,18 58,18 62,50 38,50"/>
        <!-- Middle crossbar -->
        <rect x="34" y="50" width="32" height="6" rx="2"/>
        <!-- Mid section -->
        <polygon points="34,56 66,56 74,90 26,90"/>
        <!-- Lower crossbar -->
        <rect x="22" y="90" width="56" height="7" rx="2"/>
        <!-- Lower section -->
        <polygon points="22,97 78,97 88,135 12,135"/>
        <!-- Legs -->
        <rect x="10" y="135" width="14" height="25" rx="3"/>
        <rect x="76" y="135" width="14" height="25" rx="3"/>
        <!-- Arch between legs -->
        <path d="M24 160 Q50 130 76 160" stroke="#B8973C" stroke-width="5" fill="none" stroke-linecap="round"/>
      </g>
    </svg>

    <h1><em>Paris</em> in 4 Days</h1>
    <p class="subtitle">Your Personal Tour Planner</p>
    <div class="divider"></div>
  </header>

  <main class="chat-wrapper">
    <div id="chat-window"></div>
    <div id="options-container"></div>
    <div class="input-bar">
      <input id="user-input" type="text" placeholder="Type your answer…" autocomplete="off" />
      <button id="send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </main>

  <footer>Made with <span>♥</span> for Paris lovers &nbsp;·&nbsp; ankitbansal89.github.io</footer>

  <script>
    /* ─────────────────────────────────────────
       STATE & CONVERSATION FLOW
       (Questions & plan logic will be expanded later)
    ───────────────────────────────────────── */

    const chatWindow       = document.getElementById('chat-window');
    const optionsContainer = document.getElementById('options-container');
    const userInput        = document.getElementById('user-input');
    const sendBtn          = document.getElementById('send-btn');

    // User profile — filled as conversation proceeds
    const profile = {
      month:     null,
      budget:    null,
      interests: null,
      group:     null,
    };

    /* ── Conversation steps ──
       Each step: { bot: string | fn(profile)->string, type: 'chips'|'text', options?: [], key?: string }
    */
    const steps = [
      {
        bot: `Bonjour! 🗼 I'm your personal Paris guide.\n\nLet's craft a perfect 4-day itinerary just for you. Ready to begin?`,
        type: 'chips',
        options: ["Oui, let's go! 🥐", "Absolument! ✨"],
        next: 1,
      },
      {
        bot: `Magnifique! First — which month are you planning to visit Paris?`,
        type: 'chips',
        options: ['January','February','March','April','May','June','July','August','September','October','November','December'],
        key: 'month',
        next: 2,
      },
      {
        bot: (p) => `${p.month} in Paris — a wonderful choice!\n\nWhat kind of experiences excite you most?`,
        type: 'chips',
        options: ['Art & Museums 🖼️', 'Food & Wine 🍷', 'History & Culture 🏛️', 'Romance & Walks 💌', 'Fashion & Shopping 👜', 'Hidden Gems 🗝️'],
        key: 'interests',
        next: 3,
      },
      {
        bot: `Love it! And what's your travel style for this trip?`,
        type: 'chips',
        options: ['Budget-friendly 💶', 'Mid-range comfort 🌟', 'Luxury & splurge ✨'],
        key: 'budget',
        next: 4,
      },
      {
        bot: `Almost there! Who are you exploring Paris with?`,
        type: 'chips',
        options: ['Solo adventurer 🎒', 'Romantic duo 💑', 'Family with kids 👨‍👩‍👧', 'Friends group 🥂'],
        key: 'group',
        next: 5,
      },
      {
        bot: (p) => `Parfait! Let me put together your personalised plan…`,
        type: 'plan',
        next: null,
      },
    ];

    let currentStep = 0;

    /* ── Helpers ── */

    function scrollToBottom() {
      setTimeout(() => chatWindow.scrollTop = chatWindow.scrollHeight, 80);
    }

    function addMessage(text, role = 'bot') {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'bot' ? '🗼' : 'A';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = text.replace(/\n/g, '<br>');

      msg.append(avatar, bubble);
      chatWindow.appendChild(msg);
      scrollToBottom();
      return bubble;
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      msg.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🗼';

      const tb = document.createElement('div');
      tb.className = 'typing-bubble';
      tb.innerHTML = '<span></span><span></span><span></span>';

      msg.append(avatar, tb);
      chatWindow.appendChild(msg);
      scrollToBottom();
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function showOptions(options) {
      optionsContainer.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'options-row';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = opt;
        btn.addEventListener('click', () => handleUserChoice(opt));
        row.appendChild(btn);
      });
      optionsContainer.appendChild(row);
    }

    function clearOptions() {
      optionsContainer.innerHTML = '';
    }

    /* ── Plan generation (placeholder — real logic coming soon) ── */
    function buildPlanHTML(p) {
      return `
        <div class="plan-card">
          <h2>🗺️ Your 4-Day Paris Itinerary</h2>
          <p style="margin-bottom:16px;color:var(--muted);font-size:.88rem;">
            Curated for a <strong>${p.group ?? 'traveller'}</strong> visiting in <strong>${p.month ?? 'Paris'}</strong>
            &nbsp;·&nbsp; ${p.budget ?? 'Mid-range'} &nbsp;·&nbsp; Focus: ${p.interests ?? 'Sightseeing'}
          </p>

          <div class="day-block">
            <h3>Day 1 — Iconic Paris</h3>
            <ul>
              <li>Morning: Eiffel Tower at sunrise (beat the crowds)</li>
              <li>Afternoon: Champ de Mars picnic, then Musée d'Orsay</li>
              <li>Evening: Seine river cruise & dinner in Saint-Germain</li>
            </ul>
          </div>

          <div class="day-block">
            <h3>Day 2 — Art & History</h3>
            <ul>
              <li>Morning: The Louvre (pre-book tickets!)</li>
              <li>Afternoon: Tuileries Garden stroll → Place de la Concorde</li>
              <li>Evening: Le Marais neighbourhood, rooftop cocktails</li>
            </ul>
          </div>

          <div class="day-block">
            <h3>Day 3 — Village & Versailles</h3>
            <ul>
              <li>Morning: Day trip to Palace of Versailles</li>
              <li>Afternoon: Return via Montmartre, visit Sacré-Cœur</li>
              <li>Evening: Dinner at a classic Parisian brasserie</li>
            </ul>
          </div>

          <div class="day-block">
            <h3>Day 4 — Hidden Gems & Au Revoir</h3>
            <ul>
              <li>Morning: Canal Saint-Martin walk, local café breakfast</li>
              <li>Afternoon: Sainte-Chapelle, Île de la Cité</li>
              <li>Evening: Champagne at a rooftop bar as the city lights up 🥂</li>
            </ul>
          </div>

          <p style="margin-top:8px;font-size:.82rem;color:var(--muted);font-style:italic;">
            ✦ Personalised tips for ${p.month} and more details coming soon.
          </p>
        </div>
      `;
    }

    /* ── Advance conversation ── */
    function runStep(stepIndex) {
      const step = steps[stepIndex];
      if (!step) return;

      const delay = stepIndex === 0 ? 600 : 1400;

      showTyping();
      setTimeout(() => {
        removeTyping();

        if (step.type === 'plan') {
          const botText = typeof step.bot === 'function' ? step.bot(profile) : step.bot;
          addMessage(botText, 'bot');

          showTyping();
          setTimeout(() => {
            removeTyping();
            // Inject plan as a bot message with custom card
            const msg = document.createElement('div');
            msg.className = 'msg bot';
            msg.style.animation = 'fadeUp .4s ease both';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🗼';

            const wrapper = document.createElement('div');
            wrapper.style.maxWidth = '90%';
            wrapper.innerHTML = buildPlanHTML(profile);

            msg.append(avatar, wrapper);
            chatWindow.appendChild(msg);
            scrollToBottom();

            setTimeout(() => {
              addMessage(`Voilà! Your Paris plan is ready 🥐\n\nWould you like to adjust anything — change a day, swap an activity, or get restaurant picks?`, 'bot');
              showOptions(['Looks perfect! 🎉', 'Adjust Day 1', 'Adjust Day 2', 'Adjust Day 3', 'Adjust Day 4', 'Start over']);
            }, 900);
          }, 1800);

        } else {
          const botText = typeof step.bot === 'function' ? step.bot(profile) : step.bot;
          addMessage(botText, 'bot');
          if (step.type === 'chips' && step.options) {
            showOptions(step.options);
          }
        }
      }, delay);
    }

    function handleUserChoice(choice) {
      clearOptions();

      const step = steps[currentStep];
      addMessage(choice, 'user');

      // Store value
      if (step && step.key) {
        profile[step.key] = choice.replace(/[^\w\s&]/g, '').trim();
      }

      // Advance
      currentStep = step?.next ?? currentStep + 1;
      if (steps[currentStep]) {
        runStep(currentStep);
      }
    }

    /* ── Text input ── */
    function handleTextSend() {
      const val = userInput.value.trim();
      if (!val) return;
      userInput.value = '';
      handleUserChoice(val);
    }

    sendBtn.addEventListener('click', handleTextSend);
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleTextSend();
    });

    /* ── Start ── */
    runStep(0);
  </script>
</body>
</html>
