<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paris in 4 Days — Your Personal Tour Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F7F2E8;--parchment:#EDE5D0;--gold:#B8973C;--gold-lt:#D4AF5A;
      --dark:#2C1A0E;--mid:#5C3D20;--muted:#9A8066;
      --bubble-bot:#FFFDF7;--border:#DDD0B5;
    }
    body{font-family:'Lato',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;position:relative}
    /* Versailles background */
    body::before{content:'';position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1551634979-8a82f1a4e5b2?w=1920&q=80') center/cover no-repeat;filter:brightness(.45) saturate(.8);z-index:-1}
    body::after{content:'';position:fixed;inset:0;background:linear-gradient(180deg,rgba(44,26,14,.55) 0%,rgba(247,242,232,.82) 40%,rgba(247,242,232,.92) 100%);z-index:-1}

    .topband{width:100%;height:5px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-lt) 50%,var(--gold) 100%)}
    header{width:100%;text-align:center;padding:28px 16px 18px}
    .eiffel-photo{display:block;margin:0 auto 12px;width:80px;height:80px;object-fit:cover;border-radius:50%;border:3px solid var(--gold);box-shadow:0 4px 18px rgba(44,26,14,.35)}
    header h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--dark);letter-spacing:.04em}
    header h1 em{font-style:italic;color:var(--gold)}
    header p.subtitle{margin-top:4px;font-size:.88rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
    .divider{width:70px;height:1px;background:var(--gold);margin:12px auto 0;opacity:.6}

    /* Page row: chat + sidebar button */
    .page-row{display:flex;align-items:flex-start;justify-content:center;gap:16px;width:100%;max-width:920px;padding:0 16px;flex:1}
    .chat-wrapper{width:100%;max-width:740px;padding:0 0 28px;display:flex;flex-direction:column;flex:1}

    /* Itinerary sidebar button */
    .itin-sidebar{display:none;flex-direction:column;align-items:center;justify-content:center;padding-top:12px;flex-shrink:0}
    .itin-sidebar.visible{display:flex}
    #itin-btn{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);background:var(--gold);color:#fff;border:none;border-radius:50px;padding:20px 12px;font-family:'Playfair Display',serif;font-size:.88rem;letter-spacing:.08em;cursor:pointer;box-shadow:0 4px 18px rgba(44,26,14,.28);transition:background .2s,transform .2s;white-space:nowrap}
    #itin-btn:hover{background:var(--dark);transform:rotate(180deg) translateY(3px)}
    #chat-window{background:var(--bubble-bot);border:1px solid var(--border);border-radius:18px;box-shadow:0 4px 24px rgba(44,26,14,.12);min-height:400px;max-height:62vh;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
    #chat-window::-webkit-scrollbar{width:6px}
    #chat-window::-webkit-scrollbar-track{background:transparent}
    #chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    .msg{display:flex;align-items:flex-end;gap:10px;animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot{flex-direction:row}.msg.user{flex-direction:row-reverse}
    .avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--parchment);border:1px solid var(--border)}
    .msg.user .avatar{background:var(--dark);color:var(--gold-lt);font-size:12px;font-family:'Playfair Display',serif;font-weight:600}
    .bubble{max-width:78%;padding:12px 16px;border-radius:18px;line-height:1.6;font-size:.93rem}
    .msg.bot .bubble{background:var(--bubble-bot);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--dark)}
    .msg.user .bubble{background:var(--dark);color:#F7F2E8;border-bottom-right-radius:4px}

    .typing-bubble{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--bubble-bot);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;width:fit-content}
    .typing-bubble span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite ease-in-out both}
    .typing-bubble span:nth-child(2){animation-delay:.2s}
    .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

    #options-container{min-height:0}
    .options-row{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 2px;animation:fadeUp .4s ease both}
    .chip{padding:8px 16px;border-radius:24px;border:1.5px solid var(--gold);background:transparent;color:var(--dark);font-family:'Lato',sans-serif;font-size:.86rem;cursor:pointer;transition:background .2s,color .2s,transform .15s;letter-spacing:.02em}
    .chip:hover{background:var(--gold);color:#fff;transform:translateY(-2px)}

    .input-bar{display:flex;margin-top:12px;gap:8px;background:var(--bubble-bot);border:1px solid var(--border);border-radius:50px;padding:6px 6px 6px 18px;box-shadow:0 2px 12px rgba(44,26,14,.08)}
    #user-input{flex:1;border:none;outline:none;background:transparent;font-family:'Lato',sans-serif;font-size:.93rem;color:var(--dark)}
    #user-input::placeholder{color:var(--muted)}
    #send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--gold);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;flex-shrink:0}
    #send-btn:hover{background:var(--dark);transform:scale(1.07)}

    .date-input-wrap{animation:fadeUp .35s ease both;margin:4px 0}
    .date-input-wrap label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:4px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .styled-date,.styled-time{border:1.5px solid var(--gold);border-radius:12px;padding:10px 14px;font-family:'Lato',sans-serif;font-size:.95rem;color:var(--dark);background:#FFFDF7;outline:none;cursor:pointer;width:auto;min-width:200px}
    .styled-date:focus,.styled-time:focus{border-color:var(--dark);box-shadow:0 0 0 3px rgba(184,151,60,.2)}
    .confirm-btn{margin-top:8px;padding:9px 22px;border-radius:24px;border:none;background:var(--gold);color:#fff;font-family:'Lato',sans-serif;font-size:.88rem;cursor:pointer;transition:background .2s,transform .15s;letter-spacing:.03em}
    .confirm-btn:hover{background:var(--dark);transform:translateY(-1px)}

    /* Plan card */
    .plan-card{background:var(--parchment);border:1px solid var(--border);border-radius:16px;padding:20px 22px;font-size:.9rem;line-height:1.7;color:var(--dark)}
    .plan-card h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .plan-summary{margin-bottom:14px;color:var(--muted);font-size:.84rem;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .day-block{margin-bottom:18px}
    .day-block h3{font-family:'Playfair Display',serif;font-size:.98rem;font-weight:600;color:var(--mid);margin-bottom:4px;border-left:3px solid var(--gold);padding-left:10px;display:flex;align-items:center;gap:8px}
    .day-block .weather-badge{font-size:.78rem;font-family:'Lato',sans-serif;font-weight:400;color:var(--muted);background:var(--cream);padding:2px 8px;border-radius:8px}
    .activity-card{margin:8px 0 8px 14px;padding:10px 14px;background:#FFFDF7;border:1px solid var(--border);border-radius:12px}
    .activity-card .act-name{font-weight:700;color:var(--dark);font-size:.92rem}
    .activity-card .act-time{font-size:.82rem;color:var(--gold);margin-top:2px}
    .activity-card .act-note{font-size:.8rem;color:var(--muted);margin-top:3px;font-style:italic}
    .free-slot{margin:6px 0 6px 14px;font-size:.84rem;color:var(--muted);font-style:italic;padding-left:4px}

    footer{width:100%;text-align:center;padding:12px;font-size:.76rem;color:var(--muted);letter-spacing:.04em}
    footer span{color:var(--gold)}
    @media(max-width:700px){
      .page-row{flex-direction:column;align-items:center}
      .itin-sidebar.visible{flex-direction:row;width:100%;padding:0 16px 8px}
      #itin-btn{writing-mode:horizontal-tb;transform:none;padding:10px 24px}
      #itin-btn:hover{transform:translateY(-2px)}
      #chat-window{padding:18px 12px}
      .bubble{font-size:.88rem;max-width:90%}
    }
  </style>
</head>

<header>

/* ═══════════════════════════════════════════════════════════
   SECTION 2 — DOM & STATE
   ═══════════════════════════════════════════════════════════ */
const chatW = document.getElementById('chat-window');
const optC  = document.getElementById('options-container');
const uIn   = document.getElementById('user-input');
const sBtn  = document.getElementById('send-btn');
const itinSidebar = document.getElementById('itin-sidebar');

let itineraryPlanEl = null;  // reference to plan card in DOM
const profile = { arrivalDate:null, arrivalTime:null, departureDate:null, includeOutOfParis:null };
let weatherData = null;
let builtPlan = null;  // the generated itinerary

/* ═══════════════════════════════════════════════════════════
   SECTION 3 — CHAT UI HELPERS
   ═══════════════════════════════════════════════════════════ */
function scroll(){ setTimeout(()=> chatW.scrollTop = chatW.scrollHeight, 80) }

function addMsg(text, role='bot'){

}

function addBotHTML(html){
  const m = document.createElement('div'); m.className = 'msg bot';
  m.style.animation='fadeUp .4s ease both';
  const a = document.createElement('div'); a.className = 'avatar'; a.textContent='🗼';

  m.append(a,w); chatW.appendChild(m); scroll();

function hideTyping(){ const t=document.getElementById('typing-ind'); if(t) t.remove(); }

function clearOpts(){ optC.innerHTML=''; }

function showChips(opts, cb){
  clearOpts();
  const row = document.createElement('div'); row.className='options-row';
  opts.forEach(o=>{
    const b = document.createElement('button'); b.className='chip'; b.textContent=o;
    b.addEventListener('click',()=>{ clearOpts(); cb(o); });

function showDatePicker(label, cb, isTime=false){
  clearOpts();
  const wrap = document.createElement('div'); wrap.className='date-input-wrap';
  const lbl = document.createElement('label'); lbl.textContent=label;
  const inp = document.createElement('input');
  inp.className = isTime ? 'styled-time' : 'styled-date';
  inp.type = isTime ? 'time' : 'date';
  if(!isTime){
    const today = new Date(); const minD = today.toISOString().split('T')[0];
    inp.min = minD;
    const maxD = new Date(today); maxD.setMonth(maxD.getMonth()+6);
    inp.max = maxD.toISOString().split('T')[0];
  }
  const btn = document.createElement('button'); btn.className='confirm-btn'; btn.textContent='Confirm';
  btn.addEventListener('click',()=>{
    if(!inp.value){ inp.style.borderColor='#c44'; return; }
    clearOpts(); cb(inp.value);
  });
  wrap.append(lbl,inp,document.createElement('br'),btn);
  optC.appendChild(wrap);
}

/* ═══════════════════════════════════════════════════════════
   SECTION 4 — WEATHER API  (Open-Meteo, free, no key)
   ═══════════════════════════════════════════════════════════ */
/* ── Helpers ─────────────────────────────────────────────────── */
function dateAddDays(dateStr, n){
  const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
function shiftYear(dateStr, delta){
  const d=new Date(dateStr+'T12:00:00'); d.setFullYear(d.getFullYear()+delta);
  return d.toISOString().split('T')[0];
}
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function daysFromToday(dateStr){
  return Math.round((new Date(dateStr)-new Date(todayStr()))/(864e5));
}

/* ── Fetch with timeout + retry ─────────────────────────────── */
async function fetchWithRetry(url, {timeoutMs=7000, retries=2}={}){
  for(let attempt=0; attempt<=retries; attempt++){
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(), timeoutMs);
    try{
      const r=await fetch(url,{signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch(e){
      clearTimeout(timer);
      if(attempt===retries) throw e;
      await new Promise(res=>setTimeout(res, 800*(attempt+1)));
    }
  }
}

/* ── Open-Meteo forecast (≤16 days) ─────────────────────────── */
async function fetchOMForecast(startDate, endDate){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522`
    +`&hourly=temperature_2m,precipitation,precipitation_probability,weather_code,visibility`
    +`&daily=sunrise,sunset`
    +`&timezone=Europe%2FParis&start_date=${startDate}&end_date=${endDate}`;
  const raw=await fetchWithRetry(url,{timeoutMs:6000,retries:2});
  if(!raw?.hourly) throw new Error('Bad OM forecast response');
  return raw;
}

/* ── Open-Meteo ERA5 archive (historical, for dates >16 days out) */
async function fetchOMArchive(startDate, endDate){
  // Query same calendar dates from previous year as a historical proxy
  const url=`https://archive-api.open-meteo.com/v1/archive?latitude=48.8566&longitude=2.3522`
    +`&hourly=temperature_2m,precipitation,weather_code,visibility`
    +`&daily=sunrise,sunset`
    +`&timezone=Europe%2FParis&start_date=${startDate}&end_date=${endDate}`;
  const raw=await fetchWithRetry(url,{timeoutMs:8000,retries:2});
  if(!raw?.hourly) throw new Error('Bad OM archive response');
  return raw;
}

/* ── wttr.in (last-resort fallback, 3 days) ─────────────────── */
async function fetchWttr(){
  const url=`https://wttr.in/Paris?format=j1`;
  const raw=await fetchWithRetry(url,{timeoutMs:6000,retries:1});
  if(!raw?.weather) throw new Error('Bad wttr response');
  return raw;
}

/* ── Parse Open-Meteo JSON → byDate map ─────────────────────── */
function parseOMRaw(raw, dateOffset=0){
  // dateOffset: shift parsed dates by N years (for archive remapped to current year)
  const h=raw.hourly, d=raw.daily;
  const byDate={};
  h.time.forEach((t,i)=>{
    let [date,time]=t.split('T');
    if(dateOffset) date=shiftYear(date,dateOffset);
    if(!byDate[date]) byDate[date]={hours:{},sunrise:null,sunset:null,historical:dateOffset!==0};
    byDate[date].hours[time.slice(0,5)]={
      temp:  h.temperature_2m[i],
      precip:h.precipitation[i],
      prob:  h.precipitation_probability?.[i] ?? 0,
      code:  h.weather_code[i],
      visibility: h.visibility[i]
    };
  });
  if(d?.sunrise) d.sunrise.forEach((sr,i)=>{
    let date=d.time[i];
    if(dateOffset) date=shiftYear(date,dateOffset);
    if(byDate[date]){
      byDate[date].sunrise=sr.split('T')[1].slice(0,5);
      byDate[date].sunset =d.sunset[i].split('T')[1].slice(0,5);
    }
  });
  return byDate;
}

/* ── Parse wttr.in JSON → byDate map ────────────────────────── */
function parseWttrRaw(raw){
  const wetCodes=new Set([176,179,182,185,200,227,230,248,260,263,266,
    281,284,293,296,299,302,305,308,311,314,317,320,323,326,329,332,
    335,338,350,353,356,359,362,365,368,371,374,377,386,389,392,395]);
  const byDate={};
  raw.weather.forEach(day=>{
    const date=day.date;
    if(!byDate[date]) byDate[date]={hours:{},sunrise:null,sunset:null,historical:false};
    const astro=day.astronomy?.[0];
    if(astro){ byDate[date].sunrise=to24h(astro.sunrise); byDate[date].sunset=to24h(astro.sunset); }
    day.hourly.forEach(h=>{
      const startH=Math.round(Number(h.time)/100);
      const precip=parseFloat(h.precipMM)||0;
      const code=parseInt(h.weatherCode)||0;
      const tempC=parseFloat(h.tempC)||15;
      const vis=parseFloat(h.visibility)||10;
      const isWet=precip>0||wetCodes.has(code);
      for(let hh=startH; hh<startH+3&&hh<24; hh++){
        byDate[date].hours[String(hh).padStart(2,'0')+':00']={
          temp:tempC, precip, prob:isWet?70:5,
          code:isWet?61:1, visibility:vis*1000
        };
      }
    });
  });
  return byDate;
}

function to24h(str){
  const m=str.match(/(\d+):(\d+)\s*(AM|PM)/i); if(!m) return '12:00';
  let h=parseInt(m[1]),mi=m[2],ap=m[3].toUpperCase();
  if(ap==='PM'&&h<12) h+=12; if(ap==='AM'&&h===12) h=0;
  return String(h).padStart(2,'0')+':'+mi;
}

/* ── Main fetch: hybrid forecast + historical ────────────────── */
// Returns { byDate, usedHistorical, historicalFrom, forecastSource }
async function fetchWeather(startDate, endDate){
  const FORECAST_DAYS = 15; // Open-Meteo limit
  const today = todayStr();
  const forecastCutoff = dateAddDays(today, FORECAST_DAYS);
  const tripBeyond = endDate > forecastCutoff;
  const result = { byDate:{}, usedHistorical:false, historicalFrom:null, forecastSource:null };

  // ── Part A: live forecast for dates within range ──────────────
  if(startDate <= forecastCutoff){
    const forecastEnd = tripBeyond ? forecastCutoff : endDate;
    try{
      const raw = await fetchOMForecast(startDate, forecastEnd);
      Object.assign(result.byDate, parseOMRaw(raw, 0));
      result.forecastSource = 'Open-Meteo';
    } catch(e){
      console.warn('OM forecast failed, trying wttr.in…', e.message);
      try{
        const raw = await fetchWttr();
        Object.assign(result.byDate, parseWttrRaw(raw));
        result.forecastSource = 'wttr.in';
      } catch(e2){ console.warn('wttr.in also failed:', e2.message); }
    }
  }

  // ── Part B: historical data for dates beyond forecast window ──
  if(tripBeyond){
    result.usedHistorical = true;
    // Fetch same calendar dates from last year via ERA5 archive
    const histStart = shiftYear(tripBeyond && startDate > forecastCutoff ? startDate : dateAddDays(forecastCutoff,1), -1);
    const histEnd   = shiftYear(endDate, -1);
    result.historicalFrom = histStart.slice(0,4); // last year
    try{
      const raw = await fetchOMArchive(histStart, histEnd);
      // Shift parsed dates +1 year so they match the actual trip dates
      Object.assign(result.byDate, parseOMRaw(raw, +1));
    } catch(e){
      console.warn('OM archive failed:', e.message);
      // Leave those dates without weather data — graceful degradation
    }
  }

  return (result.forecastSource || result.usedHistorical) ? result : null;
}

/* ── Compatibility shim: extract byDate from result ─────────── */
function parseWeather(result){
  return result?.byDate ?? null;
}

// WMO weather codes >= 51 = drizzle / rain / snow / thunderstorm
function isWetCode(code){ return code >= 51; }

// True if a specific hour has any rain/drizzle based on precip amount, code, or probability
function hourIsRainy(hw){
  if(!hw) return false;
  return hw.precip > 0 || isWetCode(hw.code) || hw.prob >= 40;
}

// Check if ANY hour in [startH, endH) has rain — used for outdoor slot validation
// FIX: operates on the FINAL possStart/possEnd, handles fractional hours and post-midnight
function hasRainInSlot(dayW, startH, endH){
  if(!dayW) return false;
  for(let h = Math.floor(startH); h < Math.ceil(endH); h++){
    const normalH = h % 24;
    const key = String(normalH).padStart(2,'0') + ':00';
    if(hourIsRainy(dayW.hours[key])) return true;
  }
  return false;
}

// True if the day has rain during typical activity hours (08:00–22:00)
function isDayRainy(dayW){
  if(!dayW) return false;
  for(let h=8; h<=22; h++){
    const key = String(h).padStart(2,'0')+':00';
    if(hourIsRainy(dayW.hours[key])) return true;
  }
  return false;
}

function weatherSummary(dayW){
  if(!dayW) return {text:'Weather data unavailable', icon:'☁️', hasRain:false, hasSnow:false, avgTemp:15};
  const hrs = Object.values(dayW.hours);
  const temps = hrs.map(h=>h.temp);
  const avgT = Math.round(temps.reduce((a,b)=>a+b,0)/temps.length);
  const codes = hrs.map(h=>h.code);
  const hasRain = hrs.some(h => hourIsRainy(h));
  const hasSnow = codes.some(c=> c>=71 && c<=77);
  let icon = '☀️', text = `${avgT}°C, Sunny`;
  if(hasSnow){ icon='❄️'; text=`${avgT}°C, Snow`; }
  else if(hasRain){ icon='🌧️'; text=`${avgT}°C, Rain expected`; }
  else if(codes.some(c=>c>=2 && c<=3)){ icon='⛅'; text=`${avgT}°C, Partly cloudy`; }
  return {text, icon, hasRain, hasSnow, avgTemp:avgT};
}

function hasPartialSunDuringSlot(dayW, startH, endH){
  if(!dayW) return true;
  for(let h=Math.floor(startH); h<Math.ceil(endH); h++){
    const key = String(h%24).padStart(2,'0')+':00';
    const hw = dayW.hours[key];
    if(hw && hw.code <= 2) return true;
  }
  return false;
}

function avgTempDuringSlot(dayW, startH, endH){
  if(!dayW) return 15;
  let sum=0, n=0;
  for(let h=Math.floor(startH); h<Math.ceil(endH); h++){
    const key = String(h%24).padStart(2,'0')+':00';
    const hw = dayW.hours[key];
    if(hw){ sum+=hw.temp; n++; }
  }
  return n>0 ? sum/n : 15;
}

/* ═══════════════════════════════════════════════════════════
   SECTION 5 — SCHEDULING ENGINE
   ═══════════════════════════════════════════════════════════ */
function timeToH(t){ const [h,m]=t.split(':').map(Number); return h+m/60; }
function hToTime(h){ const hh=Math.floor(h%24); const mm=Math.round((h-Math.floor(h))*60); return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); }
function dayOfWeek(dateStr){ return new Date(dateStr+'T12:00:00').getDay(); }

function getEffectiveHours(attr, dow){
  let open = timeToH(attr.open);
  let close = timeToH(attr.close);
  if(close < open) close = close + 24; // past midnight → e.g. 02:00 → 26

  if(attr.name==='Montparnasse Tower' && (dow===5||dow===6)) close=23;
  if(attr.name==='Père Lachaise' && dow===6) open=8.5;
  if(attr.name==='Louvre Museum' && dow===2) return null; // closed Tuesdays
  if(attr.name==='Notre Dame' && dow===4) close=22;
  if(attr.name==='Galeries Lafayette' && dow===0){ open=11; close=20; }

  return {open, close};
}

function checkRemarkConstraints(attr, dayW, startH, endH){
  const sunset  = dayW?.sunset  ? timeToH(dayW.sunset)  : 20;
  const sunrise = dayW?.sunrise ? timeToH(dayW.sunrise) : 7;

  if(attr.name==='Eiffel Tower Inside Tour'){
    if(startH < sunrise || endH > sunset) return false;
  }
  if(['Montparnasse Tower','Seine River Bank Walk','Latin Quarter Walk'].includes(attr.name)){
    const dlHrs = Math.min(endH, sunset) - Math.max(startH, sunrise);
    if(dlHrs < 2) return false;
  }
  if(attr.name==='Père Lachaise'){
    if(avgTempDuringSlot(dayW, startH, endH) >= 20) return false;
  }
  if(['Seine Boat Tour + Eiffel Lights','Arc de Triomphe'].includes(attr.name)){
    const dlHrs   = Math.max(0, Math.min(endH, sunset)  - Math.max(startH, sunrise));
    const nightHrs = Math.max(0, endH - Math.max(startH, sunset));
    if(dlHrs < 1 || nightHrs < 1) return false;
  }
  if(attr.name==='Luxembourg Gardens'){
    if(startH < sunrise || endH > sunset) return false;
    if(!hasPartialSunDuringSlot(dayW, startH, endH)) return false;
  }
  // Lights show constraint handled during start-time calculation, not here
  return true;
}

// Try to schedule one activity from pool onto a day; returns {attr,start,end} or null
function tryScheduleDay(day, pool, slotStart, assigned, ws, dayW){
  const sunset  = dayW?.sunset  ? timeToH(dayW.sunset)  : 20;
  const sunrise = dayW?.sunrise ? timeToH(dayW.sunrise) : 7;
  const dow = dayOfWeek(day.date);

  let bestAttr=null, bestStart=null, bestEnd=null, bestScore=-1;

  for(const attr of pool){
    // On rainy days skip outdoor
    if(day.isRainy && attr.type==='Outdoor') continue;

    const hrs = getEffectiveHours(attr, dow);
    if(!hrs) continue;

    const dur = attr.duration;
    if(dur > 4 && assigned > 0) continue;
    if(assigned > 0 && day.activities[0]?.duration > 4) continue;

    // ── Compute start/end (special attractions first) ──────────
    let possStart, possEnd;

    if(attr.name==='Eiffel Tower Lights Show Evening'){
      const nextFullHour = Math.ceil(sunset);
      possStart = nextFullHour - 0.5;
      possEnd   = possStart + dur;
      if(possStart < hrs.open || possStart < slotStart) continue;
      if(possEnd > hrs.close) continue;
    } else if(attr.name==='Seine Boat Tour + Eiffel Lights' || attr.name==='Arc de Triomphe'){
      possStart = Math.max(sunset - 2, hrs.open, slotStart);
      possEnd   = possStart + dur;
      if(possEnd > hrs.close) continue;
    } else {
      possStart = Math.max(slotStart, hrs.open);
      possEnd   = possStart + dur;
      if(possEnd > hrs.close) continue;
    }

    if(possEnd > 26) continue; // absolute cap

    // ── Rain check on FINAL slot (the bug fix) ─────────────────
    if(attr.type==='Outdoor' && hasRainInSlot(dayW, possStart, possEnd)) continue;

    // ── Remark constraints ─────────────────────────────────────
    if(!checkRemarkConstraints(attr, dayW, possStart, possEnd)) continue;

    // ── Scoring ────────────────────────────────────────────────
    const rankScore = {high:30, medium:15, low:5};
    let score = rankScore[attr.rank] || 10;
    if(attr.name==='Père Lachaise' && ws.hasSnow) score += 20;
    if(ws.hasRain && attr.type==='Indoor') score += 5;
    if(dur >= 8) score += 3;

    if(score > bestScore){ bestScore=score; bestAttr=attr; bestStart=possStart; bestEnd=possEnd; }
  }

  if(!bestAttr) return null;
  return {attr:bestAttr, start:bestStart, end:bestEnd};
}

function buildItinerary(){
  const arrival  = profile.arrivalDate;
  const arrTime  = timeToH(profile.arrivalTime);
  const departure = profile.departureDate;
  const inclOOP  = profile.includeOutOfParis;

  // ── Build day list ─────────────────────────────────────────────
  const days = [];
  let d = new Date(arrival+'T12:00:00');
  const depD = new Date(departure+'T12:00:00');

  while(d < depD){
    const ds = d.toISOString().split('T')[0];
    const isArrival = (ds === arrival);
    if(isArrival && arrTime >= 12){ d.setDate(d.getDate()+1); continue; }
    const availFrom = (isArrival && arrTime < 12) ? 17 : 8;
    const dayW = weatherData ? weatherData[ds] : null;
    days.push({
      date: ds, isArrival, availFrom,
      activities: [], noEarlyMorning: false,
      isRainy: isDayRainy(dayW), dayW,
      dow: dayOfWeek(ds)
    });
    d.setDate(d.getDate()+1);
  }

  // ── Sort pool: high rank first ─────────────────────────────────
  const rankOrder = {high:3, medium:2, low:1};
  let pool = ATTRACTIONS
    .filter(a => inclOOP || !a.outOfParis)
    .slice()
    .sort((a,b) => (rankOrder[b.rank]||0) - (rankOrder[a.rank]||0));

  // ── Separate rainy and clear days ─────────────────────────────
  const rainyIdx = days.map((_,i)=>i).filter(i=> days[i].isRainy);
  const clearIdx = days.map((_,i)=>i).filter(i=>!days[i].isRainy);

  // ── Pass 1: fill rainy days with INDOOR attractions first ──────
  // Goal: rainy days are never left empty — free days must be clear
  for(const di of rainyIdx){
    const day = days[di];
    const dayW = day.dayW;
    const ws   = weatherSummary(dayW);
    const maxAct = day.isArrival ? 1 : 2;
    let slotStart = day.availFrom;
    let assigned = 0;

    for(let pass=0; pass<maxAct && pool.length>0; pass++){
      // Only consider indoor attractions on rainy days
      const indoorPool = pool.filter(a => a.type === 'Indoor');
      const result = tryScheduleDay(day, indoorPool, slotStart, assigned, ws, dayW);
      if(!result) break;
      const {attr, start, end} = result;
      day.activities.push({ name:attr.name, type:attr.type, duration:attr.duration, start, end });
      assigned++;
      pool = pool.filter(a => a.name !== attr.name);
      slotStart = end + 2;
      if(attr.duration > 4) break;
    }
  }

  // ── Pass 2: fill clear days with remaining attractions ─────────
  // Spread activities across clear days so free days don't cluster.
  // Strategy: assign 1 activity per clear day first (one full round),
  // then a second round to add a second activity where possible.
  for(let round=0; round<2; round++){
    for(const di of clearIdx){
      const day = days[di];
      if(pool.length === 0) break;
      const dayW = day.dayW;
      const ws   = weatherSummary(dayW);
      const maxAct = day.isArrival ? 1 : 2;
      // On round 0, only add if day has 0 activities; round 1, add if day has 1
      if(day.activities.length !== round) continue;
      if(day.activities.length >= maxAct) continue;
      // Also skip if existing activity is >4h (solo day)
      if(day.activities.length > 0 && day.activities[0].duration > 4) continue;

      const slotStart = day.activities.length > 0
        ? day.activities[day.activities.length-1].end + 2
        : (day.noEarlyMorning && day.availFrom < 11 ? 11 : day.availFrom);

      const result = tryScheduleDay(day, pool, slotStart, day.activities.length, ws, dayW);
      if(!result) continue;
      const {attr, start, end} = result;
      day.activities.push({ name:attr.name, type:attr.type, duration:attr.duration, start, end });
      pool = pool.filter(a => a.name !== attr.name);
      if(attr.duration > 4) continue; // no second slot
    }
  }

  // ── Apply noEarlyMorning in chronological order ────────────────
  for(let i=0; i<days.length-1; i++){
    for(const act of days[i].activities){
      if(act.end >= 22) days[i+1].noEarlyMorning = true;
    }
  }
  // Enforce: push any early-morning starts on flagged days to 11:00
  for(const day of days){
    if(day.noEarlyMorning){
      for(const act of day.activities){
        if(act.start < 11){ const shift = 11 - act.start; act.start += shift; act.end += shift; }
      }
    }
  }

  return days;
}


/* ═══════════════════════════════════════════════════════════
   SECTION 6 — RENDER ITINERARY
   ═══════════════════════════════════════════════════════════ */
function formatDate(ds){
  const d = new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function renderPlan(days){
  let html = `<div class="plan-card" id="plan-card">
    <h2>🗺️ Your Paris Itinerary</h2>
    <div class="plan-summary">
      Arriving <strong>${formatDate(profile.arrivalDate)}</strong> at <strong>${profile.arrivalTime}</strong>
      &nbsp;·&nbsp; Departing <strong>${formatDate(profile.departureDate)}</strong>
      ${profile.includeOutOfParis ? '&nbsp;·&nbsp; Including out-of-Paris' : ''}
    </div>`;

  for(const day of days){
    const dayW = weatherData ? weatherData[day.date] : null;
    const ws = weatherSummary(dayW);
    const sunsetT = dayW ? dayW.sunset : '--:--';
    const visHrs = dayW ? Object.values(dayW.hours) : [];
    const avgVis = visHrs.length ? Math.round(visHrs.reduce((a,h)=>a+h.visibility,0)/visHrs.length/1000) : '--';

    html += `<div class="day-block">
      <h3>${formatDate(day.date)} ${day.isArrival ? '(Arrival)' : ''}
        <span class="weather-badge">${ws.icon} ${ws.text} · Sunset ${sunsetT} · Vis ~${avgVis}km</span>
      </h3>`;

    if(day.activities.length === 0){
      html += `<div class="free-slot">Free day — explore at your own pace, rest, or wander the streets of Paris</div>`;
    }

    for(const act of day.activities){
      html += `<div class="activity-card">
        <div class="act-name">${act.name} <span style="font-weight:400;color:var(--muted);font-size:.82rem">${act.type}</span></div>
        <div class="act-time">${hToTime(act.start)} – ${hToTime(act.end)} (${act.duration}h)</div>
      </div>`;
    }

    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

/* ═══════════════════════════════════════════════════════════
   SECTION 7 — CONVERSATION FLOW
   ═══════════════════════════════════════════════════════════ */
let state = 'WELCOME';

function botSay(text, delay=1200){
  return new Promise(resolve=>{
    showTyping();
    setTimeout(()=>{ hideTyping(); addMsg(text,'bot'); resolve(); }, delay);
  });
}

async function startConversation(){
  await botSay(`Bonjour! 🗼 Welcome to your personal Paris tour planner.\n\nI'll craft a day-by-day itinerary based on real-time weather, opening hours, and each attraction's unique quirks.\n\nLet's get started — when do you arrive in Paris?`, 800);
  state = 'ASK_ARRIVAL_DATE';
  showDatePicker('Select your arrival date', handleArrivalDate);
}

async function handleArrivalDate(val){
  profile.arrivalDate = val;
  addMsg(formatDate(val), 'user');
  await botSay(`Lovely! And what time does your flight (or train) land?`, 1000);
  state = 'ASK_ARRIVAL_TIME';
  showDatePicker('Select your arrival time', handleArrivalTime, true);
}

async function handleArrivalTime(val){
  profile.arrivalTime = val;
  addMsg(val, 'user');
  await botSay(`Got it! Now, when do you head back?`, 1000);
  state = 'ASK_DEPARTURE_DATE';
  showDatePicker('Select your departure date', handleDepartureDate);
}

async function handleDepartureDate(val){
  if(val <= profile.arrivalDate){
    addMsg(val, 'user');
    await botSay(`Hmm, the departure date should be after your arrival. Could you pick again?`, 800);
    showDatePicker('Select your departure date', handleDepartureDate);
    return;
  }
  profile.departureDate = val;
  addMsg(formatDate(val), 'user');
  await botSay(`Would you like to include activities outside central Paris?\n\n(Think Versailles, Disneyland — they take a full day but are unforgettable!)`, 1000);
  state = 'ASK_OOP';
  showChips(['Yes, include them!','No, stay in the city'], handleOOP);
}

async function handleOOP(val){
  addMsg(val, 'user');
  profile.includeOutOfParis = val.toLowerCase().includes('yes');
  await botSay(`Parfait! Let me check the weather forecast and build your perfect plan…`, 900);

  // Fetch weather
  showTyping();
  const weatherResult = await fetchWeather(profile.arrivalDate, profile.departureDate);
  weatherData = parseWeather(weatherResult);
  hideTyping();

  if(!weatherData){
    await botSay(`Couldn't load weather data right now — both weather services seem to be unavailable. I'll build your plan with sensible defaults.\n\nFor an accurate, weather-aware itinerary, please check back when your trip end date is within 16 days.`, 1200);
  } else if(weatherResult.usedHistorical){
    const src = weatherResult.forecastSource || 'live data';
    await botSay(
      `Weather loaded! ☀️\n\n`+
      `📡 Days within 16 days: live forecast via ${src}.\n`+
      `📅 Days beyond 16 days: based on historical Paris weather from the same dates last year — a reliable seasonal estimate, but not a live forecast.\n\n`+
      `⚠️ For the most accurate, weather-specific itinerary, check back when your trip end date is within 16 days of today.`,
      1400);
  } else {
    const src = weatherResult.forecastSource==='wttr.in' ? 'wttr.in (backup)' : 'Open-Meteo';
    await botSay(`Live weather loaded via ${src}! ☀️ Building your itinerary…`, 800);
  }

  // Build itinerary
  showTyping();
  await new Promise(r=>setTimeout(r,1500));
  builtPlan = buildItinerary();
  hideTyping();

  const planHTML = renderPlan(builtPlan);
  const el = addBotHTML(planHTML);
  itineraryPlanEl = el;
  itinSidebar.classList.add('visible');

  state = 'POST_PLAN';
  await botSay(`Voilà! Your itinerary is ready. 🥐\n\nWant to know more about a specific attraction? Just type its name and I'll share all the details — timings, tips, and things to keep in mind.`, 1000);
}

/* ═══════════════════════════════════════════════════════════
   SECTION 8 — POST-PLAN CONVERSATION
   ═══════════════════════════════════════════════════════════ */
function findAttraction(text){
  const lower = text.toLowerCase();
  let bestMatch = null, bestLen = 0;
  for(const attr of ATTRACTIONS){
    const nameLow = attr.name.toLowerCase();
    // Check if attraction name words appear in text
    const words = nameLow.split(/[\s+&]+/).filter(w=>w.length>3);
    const matches = words.filter(w => lower.includes(w));
    if(matches.length > 0 && matches.length >= words.length * 0.5){
      if(matches.length > bestLen || (matches.length === bestLen && attr.name.length > (bestMatch?.name.length||0))){
        bestLen = matches.length; bestMatch = attr;
      }
    }
    // Direct substring
    if(lower.includes(nameLow)){ bestMatch = attr; bestLen = 999; }
  }
  return bestMatch;
}

function attractionDetails(attr){
  const dow = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let info = `<strong>${attr.name}</strong> (${attr.type})\n\n`;
  info += `⏱ Duration: ${attr.duration} hours\n`;
  info += `🕐 Opens: ${attr.open} · Closes: ${attr.close}\n`;
  if(attr.outOfParis) info += `📍 Located outside central Paris\n`;
  // Remarks used internally for scheduling but not shown to user
  // Check if it's in the plan
  if(builtPlan){
    for(const day of builtPlan){
      for(const act of day.activities){
        if(act.name === attr.name){
          info += `\n✅ Scheduled on ${formatDate(day.date)} from ${hToTime(act.start)} to ${hToTime(act.end)}`;
        }
      }
    }
  }
  return info;
}

async function handlePostPlanMsg(text){
  const attr = findAttraction(text);
  if(attr){
    await botSay(attractionDetails(attr), 1000);
    await botSay(`Anything else you'd like to know? You can ask about any attraction, or just type "itinerary" to scroll back to your plan.`, 800);
  } else if(text.toLowerCase().includes('itinerary') || text.toLowerCase().includes('plan')){
    scrollToItinerary();
    await botSay(`Scrolled back to your itinerary! Anything else I can help with?`, 600);
  } else {
    await botSay(`I can share details about any of these Paris attractions — just mention one by name! For example, try "Eiffel Tower" or "Louvre" or "Wine Tasting".`, 800);
  }
}

/* ═══════════════════════════════════════════════════════════
   SECTION 9 — INPUT HANDLING
   ═══════════════════════════════════════════════════════════ */
function handleSend(){
  const val = uIn.value.trim();
  if(!val) return;
  uIn.value = '';
  addMsg(val, 'user');

  if(state === 'POST_PLAN'){
    handlePostPlanMsg(val);
  }
}

sBtn.addEventListener('click', handleSend);
uIn.addEventListener('keydown', e=>{ if(e.key==='Enter') handleSend(); });

// Kick off
startConversation();
